### method
stage: ppo
do_train: true
finetuning_type: lora
lora_target: all
ppo_buffer_size: 1
ppo_epochs: 2
ppo_target: 6.0

### dataset
dataset: rema_plantuml_mappo_tiny32
dataset_dir: data
template: llama3
cutoff_len: 3072
max_samples: 32
overwrite_cache: true
preprocessing_num_workers: 4

### output
output_dir: saves/llama3-8b/lora/rema_plantuml/mappo_v0_tiny32
