### model
model_name_or_path: LLM-Research/Meta-Llama-3-8B-Instruct
adapter_name_or_path: saves/llama3-8b/lora/hotpotqa_debug/sft
reward_model_type: api
reward_model: http://127.0.0.1:9/unused

### method
stage: ppo
do_train: true
finetuning_type: lora
lora_target: all

### dataset
dataset: mmoa_hotpotqa_debug_ppo
dataset_dir: data
template: llama3
cutoff_len: 4096
max_samples: 100
overwrite_cache: true
preprocessing_num_workers: 4

### output
output_dir: saves/llama3-8b/lora/hotpotqa_debug/mappo
logging_steps: 1
save_steps: 10
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 1.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### generate
max_new_tokens: 128
top_k: 0
top_p: 0.9
